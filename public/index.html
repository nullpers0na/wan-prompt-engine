<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WAN 2.2 Prompt Engine</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    header h1 {
      font-size: 1.5rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #ffffff;
    }

    header p {
      margin-top: 8px;
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.08em;
    }

    .container {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .mode-toggle {
      display: flex;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      overflow: hidden;
      width: fit-content;
    }

    .mode-btn {
      font-family: inherit;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #555;
      padding: 8px 20px;
      transition: background 0.15s, color 0.15s;
    }

    .mode-btn.active {
      background: #1e1e1e;
      color: #e0e0e0;
    }

    .mode-btn:hover:not(.active) { color: #888; }

    textarea {
      width: 100%;
      min-height: 120px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.875rem;
      padding: 14px;
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.6;
    }

    textarea::placeholder { color: #444; }
    textarea:focus { border-color: #555; }

    /* Upload area */
    .upload-area {
      border: 1px dashed #2a2a2a;
      border-radius: 4px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }

    .upload-area:hover, .upload-area.drag-over {
      border-color: #555;
      background: #111;
    }

    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-hint {
      font-size: 0.75rem;
      color: #444;
      letter-spacing: 0.08em;
      pointer-events: none;
    }

    .upload-hint span { color: #666; }

    .upload-preview {
      display: none;
      align-items: center;
      gap: 12px;
    }

    .upload-preview.visible { display: flex; }

    .upload-preview img {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 3px;
      border: 1px solid #2a2a2a;
    }

    .upload-preview-info {
      flex: 1;
      text-align: left;
    }

    .upload-preview-name {
      font-size: 0.8rem;
      color: #ccc;
      word-break: break-all;
    }

    .upload-preview-size {
      font-size: 0.7rem;
      color: #555;
      margin-top: 3px;
    }

    .upload-remove {
      font-family: inherit;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: none;
      border: 1px solid #333;
      color: #666;
      border-radius: 3px;
      padding: 4px 10px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .upload-remove:hover { color: #eb5757; border-color: #eb5757; }

    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    button {
      font-family: inherit;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      padding: 10px 22px;
      transition: background 0.15s, opacity 0.15s;
    }

    #generateBtn {
      background: #e0e0e0;
      color: #0a0a0a;
    }

    #generateBtn:hover:not(:disabled) { background: #ffffff; }
    #generateBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    #copyAllBtn {
      background: #1a1a1a;
      color: #888;
      border: 1px solid #2a2a2a;
      display: none;
    }

    #copyAllBtn:hover { background: #222; color: #bbb; }
    #copyAllBtn.copied { color: #6fcf97; border-color: #6fcf97; }

    #error {
      font-size: 0.8rem;
      color: #eb5757;
      display: none;
    }

    .segments {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .segment {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 4px;
      padding: 14px 16px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .segment.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .segment-label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: #555;
      white-space: nowrap;
      padding-top: 2px;
      min-width: 72px;
    }

    .segment-label span {
      display: block;
      color: #777;
      font-size: 0.7rem;
    }

    .segment-text {
      font-size: 0.85rem;
      line-height: 1.6;
      color: #d0d0d0;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #333;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1>WAN 2.2 Prompt Engine</h1>
    <p>Generate prompts for video segments or image editing</p>
  </header>

  <div class="container">
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="video">Video</button>
      <button class="mode-btn" data-mode="image">Image Edit</button>
    </div>

    <textarea id="description" placeholder="Describe your video scene…" rows="5"></textarea>

    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/gif,image/webp" />
      <div class="upload-hint" id="uploadHint">
        Drop an image here or <span>click to browse</span> &mdash; optional, helps guide the prompt
      </div>
      <div class="upload-preview" id="uploadPreview">
        <img id="previewImg" src="" alt="preview" />
        <div class="upload-preview-info">
          <div class="upload-preview-name" id="previewName"></div>
          <div class="upload-preview-size" id="previewSize"></div>
        </div>
        <button class="upload-remove" id="removeBtn" type="button">Remove</button>
      </div>
    </div>

    <div class="actions">
      <button id="generateBtn">Generate</button>
      <div class="spinner" id="spinner"></div>
      <button id="copyAllBtn">Copy All</button>
    </div>

    <div id="error"></div>

    <div class="segments" id="segments"></div>
  </div>

  <script>
    const VIDEO_TIMESTAMPS = ['~1–4s', '~5–8s', '~9–12s', '~13–16s', '~17–20s'];
    const IMAGE_LABELS = ['Concise', 'Detailed', 'Styled'];
    const ALLOWED_TYPES = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];

    const generateBtn = document.getElementById('generateBtn');
    const copyAllBtn = document.getElementById('copyAllBtn');
    const spinner = document.getElementById('spinner');
    const errorEl = document.getElementById('error');
    const segmentsEl = document.getElementById('segments');
    const descriptionEl = document.getElementById('description');
    const modeBtns = document.querySelectorAll('.mode-btn');
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const uploadHint = document.getElementById('uploadHint');
    const uploadPreview = document.getElementById('uploadPreview');
    const previewImg = document.getElementById('previewImg');
    const previewName = document.getElementById('previewName');
    const previewSize = document.getElementById('previewSize');
    const removeBtn = document.getElementById('removeBtn');

    let mode = 'video';
    let lastPrompts = [];
    let uploadedImage = null; // { data: base64string, mediaType: string }

    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        mode = btn.dataset.mode;
        modeBtns.forEach(b => b.classList.toggle('active', b === btn));
        descriptionEl.placeholder = mode === 'video'
          ? 'Describe your video scene…'
          : 'Describe the image edit you want to make…';
        segmentsEl.innerHTML = '';
        copyAllBtn.style.display = 'none';
        errorEl.style.display = 'none';
        lastPrompts = [];
      });
    });

    // Drag and drop
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    removeBtn.addEventListener('click', e => {
      e.stopPropagation();
      clearUpload();
    });

    function handleFile(file) {
      if (!ALLOWED_TYPES.includes(file.type)) {
        showError('Unsupported file type. Use JPEG, PNG, GIF, or WebP.');
        return;
      }
      const reader = new FileReader();
      reader.onload = ev => {
        const dataUrl = ev.target.result;
        const base64 = dataUrl.split(',')[1];
        uploadedImage = { data: base64, mediaType: file.type };
        previewImg.src = dataUrl;
        previewName.textContent = file.name;
        previewSize.textContent = formatBytes(file.size);
        uploadHint.style.display = 'none';
        uploadPreview.classList.add('visible');
      };
      reader.readAsDataURL(file);
    }

    function clearUpload() {
      uploadedImage = null;
      fileInput.value = '';
      previewImg.src = '';
      uploadPreview.classList.remove('visible');
      uploadHint.style.display = '';
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    generateBtn.addEventListener('click', async () => {
      const description = descriptionEl.value.trim();
      if (!description) return;

      setLoading(true);
      showError(null);
      segmentsEl.innerHTML = '';
      copyAllBtn.style.display = 'none';
      lastPrompts = [];

      const endpoint = mode === 'video' ? '/api/generate' : '/api/image-prompt';
      const body = { description };
      if (uploadedImage) body.image = uploadedImage;

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Unknown error');

        lastPrompts = data.prompts;
        renderSegments(data.prompts);
        copyAllBtn.style.display = 'inline-block';
      } catch (err) {
        showError(err.message);
      } finally {
        setLoading(false);
      }
    });

    copyAllBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(lastPrompts.join('\n')).then(() => {
        copyAllBtn.textContent = 'Copied!';
        copyAllBtn.classList.add('copied');
        setTimeout(() => {
          copyAllBtn.textContent = 'Copy All';
          copyAllBtn.classList.remove('copied');
        }, 1800);
      });
    });

    function renderSegments(prompts) {
      prompts.forEach((text, i) => {
        const seg = document.createElement('div');
        seg.className = 'segment';

        const label = mode === 'video'
          ? `<span>SEG ${i + 1}</span>${VIDEO_TIMESTAMPS[i]}`
          : `<span>${IMAGE_LABELS[i]}</span>`;

        seg.innerHTML = `
          <div class="segment-label">${label}</div>
          <div class="segment-text">${escapeHtml(text)}</div>
        `;
        segmentsEl.appendChild(seg);
        setTimeout(() => seg.classList.add('visible'), 30 + i * 60);
      });
    }

    function setLoading(on) {
      generateBtn.disabled = on;
      spinner.style.display = on ? 'block' : 'none';
    }

    function showError(msg) {
      if (msg) {
        errorEl.textContent = msg;
        errorEl.style.display = 'block';
      } else {
        errorEl.style.display = 'none';
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
