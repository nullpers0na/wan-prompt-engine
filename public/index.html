<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muse — WAN Prompt Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:          #e8357a;
      --rose-light:    #f472b6;
      --magenta:       #9b1d6e;
      --bg:            #07000d;
      --surface:       rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border:        rgba(232,53,122,0.15);
      --text:          #f0dde8;
      --text-muted:    #8b6476;
      --text-dim:      #4a2d3a;
      --gradient:      linear-gradient(135deg, var(--rose), var(--magenta));
    }

    html { height: 100%; }

    body {
      height: 100%;
      height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Background ──────────────────────────────────── */
    .bg-glow { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .bg-glow::before {
      content: ''; position: absolute;
      width: 900px; height: 900px;
      background: radial-gradient(circle, rgba(155,29,110,0.18) 0%, transparent 65%);
      top: -300px; left: 50%;
      animation: driftA 20s ease-in-out infinite alternate;
    }
    .bg-glow::after {
      content: ''; position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(232,53,122,0.10) 0%, transparent 65%);
      bottom: -100px; right: -100px;
      animation: driftB 26s ease-in-out infinite alternate;
    }
    @keyframes driftA { from { transform: translateX(-55%) translateY(0); } to { transform: translateX(-45%) translateY(50px); } }
    @keyframes driftB { from { transform: translate(0,0); } to { transform: translate(-50px,-80px); } }

    .grid-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(232,53,122,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,53,122,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 30%, transparent 100%);
    }

    /* ── Header ──────────────────────────────────────── */
    .site-header {
      position: relative; z-index: 10;
      flex-shrink: 0;
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(7,0,13,0.92);
      backdrop-filter: blur(10px);
    }

    .history-toggle {
      flex-shrink: 0;
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 6px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.2s, background 0.2s;
    }
    .history-toggle:hover { color: var(--rose-light); background: rgba(232,53,122,0.08); }
    .history-toggle svg { width: 18px; height: 18px; }

    .header-logo {
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; flex-shrink: 0;
      background: rgba(155,29,110,0.15);
      border: 1px solid rgba(232,53,122,0.3);
      border-radius: 10px;
    }
    .header-logo svg { width: 20px; height: 20px; }

    .header-titles { flex: 1; min-width: 0; }
    .header-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.25rem; font-weight: 400; font-style: italic;
      background: linear-gradient(135deg, #f9d0e4 20%, var(--rose-light) 60%, var(--rose) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      line-height: 1.2; display: block;
    }
    .header-sub {
      font-size: 0.65rem; color: var(--text-dim);
      letter-spacing: 0.08em; text-transform: uppercase;
    }

    .new-chat-btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem; font-weight: 500;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-muted); border-radius: 8px;
      padding: 6px 14px; cursor: pointer; white-space: nowrap;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .new-chat-btn:hover { color: var(--rose-light); border-color: rgba(232,53,122,0.4); background: rgba(232,53,122,0.06); }

    /* ── History panel ───────────────────────────────── */
    .history-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(2px);
    }
    .history-overlay.open { display: block; }

    .history-panel {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 300px; max-width: 85vw;
      z-index: 51;
      background: rgba(10,2,18,0.97);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    .history-panel.open { transform: translateX(0); }

    .history-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .history-title {
      font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .history-close {
      background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 1.1rem; line-height: 1;
      padding: 2px 6px; transition: color 0.15s;
    }
    .history-close:hover { color: var(--rose-light); }

    .history-list {
      flex: 1; overflow-y: auto;
      padding: 8px;
    }
    .history-list::-webkit-scrollbar { width: 3px; }
    .history-list::-webkit-scrollbar-thumb { background: rgba(232,53,122,0.2); border-radius: 3px; }

    .history-empty {
      text-align: center; padding: 40px 16px;
      color: var(--text-dim); font-size: 0.82rem; line-height: 1.6;
    }

    .history-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 10px 12px;
      border-radius: 10px; cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
    }
    .history-item:hover { background: var(--surface-hover); }
    .history-item.active {
      background: rgba(232,53,122,0.07);
      border-color: rgba(232,53,122,0.2);
    }
    .history-item-body { flex: 1; min-width: 0; }
    .history-item-title {
      font-size: 0.84rem; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1.4;
    }
    .history-item-date {
      font-size: 0.7rem; color: var(--text-dim); margin-top: 2px;
    }
    .history-item-delete {
      flex-shrink: 0;
      background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 0.9rem; padding: 2px 5px;
      border-radius: 5px; opacity: 0;
      transition: color 0.15s, opacity 0.15s;
    }
    .history-item:hover .history-item-delete { opacity: 1; }
    .history-item-delete:hover { color: #fca5a5; }

    /* ── Chat area ───────────────────────────────────── */
    .chat-area {
      position: relative; z-index: 1;
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(232,53,122,0.2); border-radius: 4px; }

    .chat-inner {
      width: 100%; max-width: 780px;
      margin: 0 auto;
      display: flex; flex-direction: column; gap: 18px;
    }

    /* ── Messages ────────────────────────────────────── */
    .message {
      display: flex;
      animation: msgIn 0.2s ease;
    }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .message-user { justify-content: flex-end; }
    .message-assistant { justify-content: flex-start; }

    /* User bubble */
    .user-bubble {
      max-width: 80%;
      display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
    }
    .user-text {
      background: var(--gradient);
      color: #fff;
      padding: 10px 15px;
      border-radius: 16px 16px 4px 16px;
      font-size: 0.9rem; line-height: 1.6;
      word-break: break-word;
    }
    .user-image {
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      max-width: 220px; max-height: 220px;
      object-fit: cover;
    }

    /* AI bubble */
    .ai-wrap {
      display: flex; gap: 10px; align-items: flex-start;
      max-width: 90%;
    }
    .message-assistant { flex-direction: column; align-items: flex-start; }
    .ai-avatar {
      flex-shrink: 0;
      width: 30px; height: 30px; margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(155,29,110,0.15);
      border: 1px solid rgba(232,53,122,0.25);
      border-radius: 8px;
    }
    .ai-avatar svg { width: 16px; height: 16px; }
    .ai-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      padding: 12px 15px;
      font-size: 0.9rem; line-height: 1.65;
      color: var(--text);
      flex: 1; min-width: 0;
    }
    .ai-content .msg-text { white-space: pre-wrap; word-break: break-word; }
    .ai-content strong { color: var(--rose-light); font-weight: 600; }

    /* Standalone prompt card */
    .prompt-card {
      margin-left: 40px;
      max-width: 75%;
      align-self: flex-start;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(232,53,122,0.3);
      border-left: 3px solid var(--rose);
      border-radius: 0 12px 12px 12px;
      overflow: hidden;
    }
    .prompt-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px;
      background: rgba(232,53,122,0.08);
      border-bottom: 1px solid rgba(232,53,122,0.15);
    }
    .prompt-card-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--rose-light);
    }
    .copy-prompt-btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem; font-weight: 600;
      background: var(--gradient); border: none;
      color: #fff; border-radius: 6px;
      padding: 5px 14px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .copy-prompt-btn:hover { opacity: 0.85; }
    .copy-prompt-btn.copied { background: rgba(74,222,128,0.2); color: #4ade80; }
    .prompt-card pre {
      font-family: 'Space Mono', monospace;
      font-size: 0.82rem; line-height: 1.75;
      white-space: pre-wrap; word-break: break-word;
      color: var(--text); padding: 14px 16px;
    }

    /* Negative card */
    .negative-card {
      margin-left: 40px;
      max-width: 75%;
      align-self: flex-start;
      padding: 8px 14px;
      background: rgba(252,165,165,0.04);
      border: 1px solid rgba(252,165,165,0.12);
      border-radius: 10px;
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem; line-height: 1.55;
      color: var(--text-muted); word-break: break-word;
    }
    .negative-card .neg-label {
      font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: rgba(252,165,165,0.5); display: block; margin-bottom: 3px;
    }

    /* Error message */
    .error-message {
      background: rgba(252,165,165,0.07);
      border: 1px solid rgba(252,165,165,0.2);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: #fca5a5;
      max-width: 85%;
      word-break: break-word;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .regen-btn {
      flex-shrink: 0;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem; font-weight: 600;
      background: rgba(252,165,165,0.12); border: 1px solid rgba(252,165,165,0.25);
      color: #fca5a5; border-radius: 7px;
      padding: 5px 12px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .regen-btn:hover { background: rgba(252,165,165,0.22); border-color: rgba(252,165,165,0.45); }

    /* ── Typing indicator ────────────────────────────── */
    .typing-wrap {
      display: flex; align-items: flex-start; gap: 10px;
      animation: msgIn 0.2s ease;
    }
    .typing-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
      padding: 14px 16px;
      display: flex; gap: 5px; align-items: center;
    }
    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--rose-light);
      animation: typingPulse 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingPulse { 0%,80%,100% { opacity: 0.2; transform: scale(0.75); } 40% { opacity: 1; transform: scale(1); } }

    /* ── Input dock ──────────────────────────────────── */
    .input-dock {
      position: relative; z-index: 10;
      flex-shrink: 0;
      padding: 10px 16px 14px;
      border-top: 1px solid var(--border);
      background: rgba(7,0,13,0.95);
      backdrop-filter: blur(10px);
    }

    .input-inner {
      width: 100%; max-width: 780px;
      margin: 0 auto;
      display: flex; flex-direction: column; gap: 8px;
    }

    /* Attachment preview bar */
    .attachment-bar {
      display: none;
      align-items: center; gap: 10px;
      padding: 8px 12px;
      background: rgba(232,53,122,0.06);
      border: 1px solid rgba(232,53,122,0.2);
      border-radius: 10px;
    }
    .attachment-bar.visible { display: flex; }
    .attach-thumb {
      width: 44px; height: 44px;
      object-fit: cover; border-radius: 7px;
      border: 1px solid rgba(232,53,122,0.25);
      flex-shrink: 0;
    }
    .attach-name {
      flex: 1; font-size: 0.8rem; color: var(--text-muted);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .attach-remove {
      background: none; border: none; color: var(--text-dim);
      font-size: 1rem; cursor: pointer; padding: 2px 6px;
      transition: color 0.15s; line-height: 1;
    }
    .attach-remove:hover { color: var(--rose-light); }

    /* Input row */
    .input-row {
      display: flex; align-items: flex-end; gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px 8px 8px 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-row:focus-within {
      border-color: rgba(232,53,122,0.35);
      box-shadow: 0 0 0 3px rgba(232,53,122,0.07);
    }

    .attach-btn {
      flex-shrink: 0;
      background: none; border: none; color: var(--text-dim);
      cursor: pointer; padding: 4px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.2s, background 0.2s;
    }
    .attach-btn:hover { color: var(--rose-light); background: rgba(232,53,122,0.08); }
    .attach-btn svg { width: 20px; height: 20px; }

    #msgInput {
      flex: 1;
      background: transparent; border: none; outline: none;
      color: var(--text); font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem; line-height: 1.55;
      resize: none; overflow-y: hidden;
      padding: 3px 0;
      max-height: 140px; overflow-y: auto;
    }
    #msgInput::placeholder { color: var(--text-dim); }
    #msgInput::-webkit-scrollbar { width: 3px; }
    #msgInput::-webkit-scrollbar-thumb { background: rgba(232,53,122,0.2); border-radius: 3px; }

    .send-btn {
      flex-shrink: 0;
      background: var(--gradient); border: none;
      color: #fff; border-radius: 9px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 2px 12px rgba(232,53,122,0.3);
    }
    .send-btn:hover:not(:disabled) { opacity: 0.88; transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 16px; height: 16px; }

    .input-hint {
      text-align: center;
      font-size: 0.65rem; color: var(--text-dim);
      letter-spacing: 0.04em;
    }

    /* ── Mobile ──────────────────────────────────────── */
    @media (max-width: 600px) {
      .header-sub { display: none; }
      .chat-area { padding: 14px 10px 6px; }
      .input-dock { padding: 8px 10px max(env(safe-area-inset-bottom), 10px); }
      .user-bubble { max-width: 90%; }
      .ai-wrap { max-width: 96%; }
      #msgInput { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="grid-bg"></div>

  <!-- History panel -->
  <div class="history-overlay" id="historyOverlay"></div>
  <aside class="history-panel" id="historyPanel">
    <div class="history-header">
      <span class="history-title">History</span>
      <button class="history-close" id="historyClose">✕</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </aside>

  <header class="site-header">
    <button class="history-toggle" id="historyToggle" title="Chat history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="header-logo">
      <svg viewBox="0 0 34 34" fill="none">
        <circle cx="17" cy="17" r="4" fill="url(#hlg)"/>
        <path d="M17 4 C17 4 22 9 22 14 C22 16 20 17 17 17 C14 17 12 16 12 14 C12 9 17 4 17 4Z" fill="url(#hlg)" opacity="0.9"/>
        <path d="M30 17 C30 17 25 22 20 22 C18 22 17 20 17 17 C17 14 18 12 20 12 C25 12 30 17 30 17Z" fill="url(#hlg)" opacity="0.75"/>
        <path d="M17 30 C17 30 12 25 12 20 C12 18 14 17 17 17 C20 17 22 18 22 20 C22 25 17 30 17 30Z" fill="url(#hlg)" opacity="0.9"/>
        <path d="M4 17 C4 17 9 12 14 12 C16 12 17 14 17 17 C17 20 16 22 14 22 C9 22 4 17 4 17Z" fill="url(#hlg)" opacity="0.75"/>
        <defs><linearGradient id="hlg" x1="4" y1="4" x2="30" y2="30" gradientUnits="userSpaceOnUse"><stop stop-color="#f9d0e4"/><stop offset="0.5" stop-color="#e8357a"/><stop offset="1" stop-color="#9b1d6e"/></linearGradient></defs>
      </svg>
    </div>
    <div class="header-titles">
      <span class="header-name">Muse</span>
      <span class="header-sub">WAN 2.2 Prompt Engine</span>
    </div>
    <button class="new-chat-btn" id="newChatBtn">New chat</button>
  </header>

  <main class="chat-area" id="chatArea">
    <div class="chat-inner" id="chatInner">
      <!-- messages rendered here -->
    </div>
  </main>

  <div class="input-dock">
    <div class="input-inner">
      <div class="attachment-bar" id="attachmentBar">
        <img class="attach-thumb" id="attachThumb" src="" alt="" />
        <span class="attach-name" id="attachName"></span>
        <button class="attach-remove" id="attachRemove" title="Remove image">✕</button>
      </div>
      <div class="input-row">
        <button class="attach-btn" id="attachBtn" type="button" title="Attach image">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
        </button>
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp,image/gif" hidden />
        <textarea id="msgInput" placeholder="Tell me what you want…" rows="1"></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter to send &middot; Shift+Enter for new line</div>
    </div>
  </div>

  <script>
    // ── Constants ──────────────────────────────────────
    const GREETING = "Hey 💋 Tell me what you want — describe a scene, a clip, or drop an image. I'll write the prompt.";

    const PROMPT_SIGNALS = /camera locked|face locked|static scene|preserve her face|soft-body jiggle|rhythmic bounce|heavy sway|slow motion/i;

    const AVATAR_SVG = `<svg viewBox="0 0 34 34" fill="none"><circle cx="17" cy="17" r="4" fill="url(#avg)"/><path d="M17 4 C17 4 22 9 22 14 C22 16 20 17 17 17 C14 17 12 16 12 14 C12 9 17 4 17 4Z" fill="url(#avg)" opacity="0.9"/><path d="M30 17 C30 17 25 22 20 22 C18 22 17 20 17 17 C17 14 18 12 20 12 C25 12 30 17 30 17Z" fill="url(#avg)" opacity="0.75"/><path d="M17 30 C17 30 12 25 12 20 C12 18 14 17 17 17 C20 17 22 18 22 20 C22 25 17 30 17 30Z" fill="url(#avg)" opacity="0.9"/><path d="M4 17 C4 17 9 12 14 12 C16 12 17 14 17 17 C17 20 16 22 14 22 C9 22 4 17 4 17Z" fill="url(#avg)" opacity="0.75"/><defs><linearGradient id="avg" x1="4" y1="4" x2="30" y2="30" gradientUnits="userSpaceOnUse"><stop stop-color="#f9d0e4"/><stop offset="0.5" stop-color="#e8357a"/><stop offset="1" stop-color="#9b1d6e"/></linearGradient></defs></svg>`;

    const STORAGE_KEY = 'muse_chats';

    // ── State ──────────────────────────────────────────
    let conversation = [];
    let pendingImage = null;
    let isLoading = false;
    let currentChatId = null;
    let lastImgPayload = null;

    // ── DOM refs ───────────────────────────────────────
    const chatInner      = document.getElementById('chatInner');
    const chatArea       = document.getElementById('chatArea');
    const msgInput       = document.getElementById('msgInput');
    const sendBtn        = document.getElementById('sendBtn');
    const attachBtn      = document.getElementById('attachBtn');
    const fileInput      = document.getElementById('fileInput');
    const attachmentBar  = document.getElementById('attachmentBar');
    const attachThumb    = document.getElementById('attachThumb');
    const attachName     = document.getElementById('attachName');
    const attachRemove   = document.getElementById('attachRemove');
    const newChatBtn     = document.getElementById('newChatBtn');
    const historyToggle  = document.getElementById('historyToggle');
    const historyPanel   = document.getElementById('historyPanel');
    const historyOverlay = document.getElementById('historyOverlay');
    const historyClose   = document.getElementById('historyClose');
    const historyList    = document.getElementById('historyList');

    // ── Init ───────────────────────────────────────────
    appendMessage('assistant', GREETING);
    msgInput.focus();

    // ── Input handling ─────────────────────────────────
    msgInput.addEventListener('input', () => {
      autoResize();
      sendBtn.disabled = isLoading || (!msgInput.value.trim() && !pendingImage);
    });

    msgInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!sendBtn.disabled) sendMessage();
      }
    });

    sendBtn.addEventListener('click', sendMessage);

    newChatBtn.addEventListener('click', () => {
      saveCurrentChat();
      startNewChat();
    });

    // ── History panel ──────────────────────────────────
    historyToggle.addEventListener('click', openHistory);
    historyClose.addEventListener('click', closeHistory);
    historyOverlay.addEventListener('click', closeHistory);

    function openHistory() {
      renderHistoryPanel();
      historyPanel.classList.add('open');
      historyOverlay.classList.add('open');
    }

    function closeHistory() {
      historyPanel.classList.remove('open');
      historyOverlay.classList.remove('open');
    }

    function getSavedChats() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
    }

    function setSavedChats(chats) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(chats)); } catch {}
    }

    function saveCurrentChat() {
      const userMessages = conversation.filter(m => m.role === 'user');
      if (!userMessages.length) return;

      const chats = getSavedChats();
      const title = userMessages[0].content.slice(0, 60) || 'Chat';
      const now = Date.now();

      if (currentChatId) {
        const idx = chats.findIndex(c => c.id === currentChatId);
        if (idx !== -1) {
          chats[idx].messages = [...conversation];
          chats[idx].updatedAt = now;
          setSavedChats(chats);
          return;
        }
      }

      currentChatId = now.toString();
      chats.unshift({ id: currentChatId, title, createdAt: now, updatedAt: now, messages: [...conversation] });
      setSavedChats(chats);
    }

    function loadChat(id) {
      saveCurrentChat();
      const chats = getSavedChats();
      const chat = chats.find(c => c.id === id);
      if (!chat) return;

      currentChatId = chat.id;
      conversation = [...chat.messages];

      chatInner.innerHTML = '';
      appendMessage('assistant', GREETING);
      for (const msg of conversation) {
        appendMessage(msg.role, msg.content);
      }

      closeHistory();
      scrollToBottom();
      msgInput.focus();
    }

    function deleteChat(id, e) {
      e.stopPropagation();
      const chats = getSavedChats().filter(c => c.id !== id);
      setSavedChats(chats);
      if (currentChatId === id) {
        currentChatId = null;
      }
      renderHistoryPanel();
    }

    function renderHistoryPanel() {
      const chats = getSavedChats();
      if (!chats.length) {
        historyList.innerHTML = '<div class="history-empty">No saved chats yet.<br>Start a conversation to see it here.</div>';
        return;
      }
      historyList.innerHTML = chats.map(c => `
        <div class="history-item${c.id === currentChatId ? ' active' : ''}" onclick="loadChat('${c.id}')">
          <div class="history-item-body">
            <div class="history-item-title">${escapeHtml(c.title)}</div>
            <div class="history-item-date">${formatDate(c.updatedAt || c.createdAt)}</div>
          </div>
          <button class="history-item-delete" onclick="deleteChat('${c.id}', event)" title="Delete">✕</button>
        </div>
      `).join('');
    }

    function formatDate(ts) {
      const d = new Date(ts);
      const now = new Date();
      const diff = now - d;
      if (diff < 60000) return 'Just now';
      if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
      if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
      if (diff < 604800000) return `${Math.floor(diff / 86400000)}d ago`;
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }

    function startNewChat() {
      currentChatId = null;
      conversation = [];
      pendingImage = null;
      clearAttachment();
      chatInner.innerHTML = '';
      appendMessage('assistant', GREETING);
      msgInput.value = '';
      autoResize();
      sendBtn.disabled = true;
      msgInput.focus();
    }

    // ── Image attachment ───────────────────────────────
    attachBtn.addEventListener('click', () => fileInput.click());
    attachRemove.addEventListener('click', clearAttachment);

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) handleFile(file);
      fileInput.value = '';
    });

    function handleFile(file) {
      if (!file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = e => {
        const src = e.target.result;
        const imgEl = new Image();
        imgEl.onload = () => {
          try {
            const MAX = 1024;
            let { width, height } = imgEl;
            if (width > MAX || height > MAX) {
              if (width > height) { height = Math.round(height * MAX / width); width = MAX; }
              else { width = Math.round(width * MAX / height); height = MAX; }
            }
            const canvas = document.createElement('canvas');
            canvas.width = width; canvas.height = height;
            canvas.getContext('2d').drawImage(imgEl, 0, 0, width, height);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
            pendingImage = { data: dataUrl.split(',')[1], mediaType: 'image/jpeg' };
            attachThumb.src = dataUrl;
          } catch {
            pendingImage = { data: src.split(',')[1], mediaType: file.type };
            attachThumb.src = src;
          }
          attachName.textContent = file.name;
          attachmentBar.classList.add('visible');
          sendBtn.disabled = isLoading;
          msgInput.focus();
        };
        imgEl.onerror = () => {
          pendingImage = { data: src.split(',')[1], mediaType: file.type };
          attachThumb.src = src;
          attachName.textContent = file.name;
          attachmentBar.classList.add('visible');
          sendBtn.disabled = isLoading;
          msgInput.focus();
        };
        imgEl.src = src;
      };
      reader.readAsDataURL(file);
    }

    function clearAttachment() {
      pendingImage = null;
      attachThumb.src = '';
      attachName.textContent = '';
      attachmentBar.classList.remove('visible');
      sendBtn.disabled = isLoading || !msgInput.value.trim();
    }

    // ── Send ───────────────────────────────────────────
    async function sendMessage() {
      const text = msgInput.value.trim();
      if ((!text && !pendingImage) || isLoading) return;

      isLoading = true;
      sendBtn.disabled = true;

      appendMessage('user', text, pendingImage);
      conversation.push({ role: 'user', content: text || '(image)' });

      const imgPayload = pendingImage;
      lastImgPayload = imgPayload;
      msgInput.value = '';
      autoResize();
      clearAttachment();

      showTyping();
      scrollToBottom();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversation, image: imgPayload }),
        });

        hideTyping();

        if (!res.ok) {
          const body = await res.text().catch(() => '');
          let msg;
          try { msg = JSON.parse(body).error; } catch { msg = null; }
          appendError(msg || `HTTP ${res.status}${body ? ': ' + body.slice(0, 200) : ''}`);
          return;
        }

        const data = await res.json();
        conversation.push({ role: 'assistant', content: data.message });
        appendMessage('assistant', data.message);
        saveCurrentChat();
      } catch (err) {
        hideTyping();
        appendError(err.message || 'Network error.');
      } finally {
        isLoading = false;
        sendBtn.disabled = !msgInput.value.trim() && !pendingImage;
      }
    }

    // ── Render ─────────────────────────────────────────
    function appendMessage(role, content, img = null) {
      const wrap = document.createElement('div');
      wrap.className = `message message-${role}`;

      if (role === 'user') {
        const bubble = document.createElement('div');
        bubble.className = 'user-bubble';
        if (img) {
          const imgEl = document.createElement('img');
          imgEl.className = 'user-image';
          imgEl.src = `data:${img.mediaType};base64,${img.data}`;
          bubble.appendChild(imgEl);
        }
        if (content) {
          const textEl = document.createElement('div');
          textEl.className = 'user-text';
          textEl.textContent = content;
          bubble.appendChild(textEl);
        }
        wrap.appendChild(bubble);
      } else {
        const parts = parseContent(content);

        const textParts = parts.filter(p => p.type === 'text' && p.content.trim());
        if (textParts.length) {
          const aiWrap = document.createElement('div');
          aiWrap.className = 'ai-wrap';
          const avatar = document.createElement('div');
          avatar.className = 'ai-avatar';
          avatar.innerHTML = AVATAR_SVG;
          const bubble = document.createElement('div');
          bubble.className = 'ai-content';
          // trim each text part to remove leading/trailing blank lines
          bubble.innerHTML = textParts.map(p => `<span class="msg-text">${formatText(escapeHtml(p.content.trim()))}</span>`).join('');
          aiWrap.appendChild(avatar);
          aiWrap.appendChild(bubble);
          wrap.appendChild(aiWrap);
        }

        parts.filter(p => p.type === 'code').forEach(p => {
          const card = document.createElement('div');
          card.className = 'prompt-card';
          card.innerHTML = `<div class="prompt-card-header">
              <span class="prompt-card-label">Prompt</span>
              <button class="copy-prompt-btn" onclick="copyPrompt(this)">Copy</button>
            </div>
            <pre>${escapeHtml(p.content)}</pre>`;
          wrap.appendChild(card);
        });

        parts.filter(p => p.type === 'negative').forEach(p => {
          const card = document.createElement('div');
          card.className = 'negative-card';
          card.innerHTML = `<span class="neg-label">Negative</span>${escapeHtml(p.content)}`;
          wrap.appendChild(card);
        });
      }

      chatInner.appendChild(wrap);
      scrollToBottom();
    }

    function appendError(msg) {
      const wrap = document.createElement('div');
      wrap.className = 'message message-assistant';
      wrap.id = 'last-error';
      const inner = document.createElement('div');
      inner.className = 'error-message';
      inner.innerHTML = `<span>⚠ ${escapeHtml(msg)}</span><button class="regen-btn" onclick="regenerate()">Try again</button>`;
      wrap.appendChild(inner);
      chatInner.appendChild(wrap);
      scrollToBottom();
    }

    async function regenerate() {
      const errEl = document.getElementById('last-error');
      if (errEl) errEl.remove();

      isLoading = true;
      sendBtn.disabled = true;
      showTyping();
      scrollToBottom();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversation, image: lastImgPayload }),
        });

        hideTyping();

        if (!res.ok) {
          const body = await res.text().catch(() => '');
          let errMsg;
          try { errMsg = JSON.parse(body).error; } catch { errMsg = null; }
          appendError(errMsg || `HTTP ${res.status}${body ? ': ' + body.slice(0, 200) : ''}`);
          return;
        }

        const data = await res.json();
        conversation.push({ role: 'assistant', content: data.message });
        appendMessage('assistant', data.message);
        saveCurrentChat();
      } catch (err) {
        hideTyping();
        appendError(err.message || 'Network error.');
      } finally {
        isLoading = false;
        sendBtn.disabled = !msgInput.value.trim() && !pendingImage;
      }
    }

    // ── Content parser ─────────────────────────────────
    function parseContent(text) {
      const parts = [];
      const segments = text.split(/(```[\s\S]*?```)/g);
      const hasCodeBlock = segments.some(s => s.startsWith('```'));

      if (!hasCodeBlock && PROMPT_SIGNALS.test(text)) {
        const negMatch = text.match(/^NEGATIVE:\s*(.+)$/im);
        if (negMatch) {
          const promptPart = text.replace(negMatch[0], '').trim();
          parts.push({ type: 'code', content: promptPart });
          parts.push({ type: 'negative', content: negMatch[1].trim() });
        } else {
          parts.push({ type: 'code', content: text.trim() });
        }
        return parts;
      }

      for (const seg of segments) {
        if (seg.startsWith('```')) {
          const raw = seg.split('\n').slice(1).join('\n').replace(/```\s*$/, '').trim();
          // If the code block starts with a short non-prompt line (reaction bled in),
          // extract it as text and treat the rest as the prompt
          const blankIdx = raw.indexOf('\n\n');
          if (blankIdx !== -1) {
            const head = raw.slice(0, blankIdx).trim();
            const rest = raw.slice(blankIdx).trim();
            if (head && rest && head.length < 140 && !PROMPT_SIGNALS.test(head)) {
              parts.push({ type: 'text', content: head });
              parts.push({ type: 'code', content: rest });
              continue;
            }
          }
          if (raw) parts.push({ type: 'code', content: raw });
        } else {
          const negMatch = seg.match(/^NEGATIVE:\s*(.+)$/im);
          if (negMatch) {
            const cleaned = seg.replace(negMatch[0], '').trim();
            if (cleaned) parts.push({ type: 'text', content: cleaned });
            parts.push({ type: 'negative', content: negMatch[1].trim() });
          } else {
            parts.push({ type: 'text', content: seg });
          }
        }
      }
      return parts;
    }

    function formatText(escaped) {
      return escaped
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<code style="font-family:Space Mono,monospace;font-size:0.82em;color:var(--rose-light);background:rgba(232,53,122,0.1);padding:1px 5px;border-radius:4px;">$1</code>')
        .replace(/\n/g, '<br>');
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Copy ───────────────────────────────────────────
    function copyPrompt(btn) {
      const code = btn.closest('.prompt-card').querySelector('pre').textContent;
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    }

    // ── Typing indicator ───────────────────────────────
    let typingEl = null;

    function showTyping() {
      typingEl = document.createElement('div');
      typingEl.className = 'typing-wrap';
      typingEl.innerHTML = `
        <div class="ai-avatar" style="flex-shrink:0;width:30px;height:30px;margin-top:2px;display:flex;align-items:center;justify-content:center;background:rgba(155,29,110,0.15);border:1px solid rgba(232,53,122,0.25);border-radius:8px;">
          <svg viewBox="0 0 34 34" fill="none" width="16" height="16"><circle cx="17" cy="17" r="4" fill="url(#tg)"/><path d="M17 4 C17 4 22 9 22 14 C22 16 20 17 17 17 C14 17 12 16 12 14 C12 9 17 4 17 4Z" fill="url(#tg)" opacity="0.9"/><path d="M30 17 C30 17 25 22 20 22 C18 22 17 20 17 17 C17 14 18 12 20 12 C25 12 30 17 30 17Z" fill="url(#tg)" opacity="0.75"/><path d="M17 30 C17 30 12 25 12 20 C12 18 14 17 17 17 C20 17 22 18 22 20 C22 25 17 30 17 30Z" fill="url(#tg)" opacity="0.9"/><path d="M4 17 C4 17 9 12 14 12 C16 12 17 14 17 17 C17 20 16 22 14 22 C9 22 4 17 4 17Z" fill="url(#tg)" opacity="0.75"/><defs><linearGradient id="tg" x1="4" y1="4" x2="30" y2="30" gradientUnits="userSpaceOnUse"><stop stop-color="#f9d0e4"/><stop offset="0.5" stop-color="#e8357a"/><stop offset="1" stop-color="#9b1d6e"/></linearGradient></defs></svg>
        </div>
        <div class="typing-bubble">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>`;
      chatInner.appendChild(typingEl);
      scrollToBottom();
    }

    function hideTyping() {
      if (typingEl) { typingEl.remove(); typingEl = null; }
    }

    // ── Utilities ──────────────────────────────────────
    function autoResize() {
      msgInput.style.height = 'auto';
      msgInput.style.height = Math.min(msgInput.scrollHeight, 140) + 'px';
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        chatArea.scrollTop = chatArea.scrollHeight;
      });
    }
  </script>
</body>
</html>
