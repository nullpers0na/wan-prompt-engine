<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WAN 2.2 Prompt Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose:       #e8357a;
      --rose-light: #f472b6;
      --magenta:    #9b1d6e;
      --bg:         #07000d;
      --surface:    rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border:     rgba(232,53,122,0.15);
      --text:       #f0dde8;
      --text-muted: #8b6476;
      --text-dim:   #4a2d3a;
      --gradient:   linear-gradient(135deg, var(--rose), var(--magenta));
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 16px 100px;
      overflow-x: hidden;
    }

    /* ── Background glows ──────────────────────────────────────────────────── */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .bg-glow::before {
      content: '';
      position: absolute;
      width: 900px; height: 900px;
      background: radial-gradient(circle, rgba(155,29,110,0.2) 0%, transparent 65%);
      top: -300px; left: 50%;
      transform: translateX(-50%);
      animation: driftA 20s ease-in-out infinite alternate;
    }

    .bg-glow::after {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(232,53,122,0.12) 0%, transparent 65%);
      bottom: -100px; right: -100px;
      animation: driftB 26s ease-in-out infinite alternate;
    }

    @keyframes driftA {
      from { transform: translateX(-55%) translateY(0); }
      to   { transform: translateX(-45%) translateY(50px); }
    }
    @keyframes driftB {
      from { transform: translate(0,0); }
      to   { transform: translate(-50px,-80px); }
    }

    .grid-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(232,53,122,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,53,122,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 30%, transparent 100%);
    }

    /* ── Silhouette curves ─────────────────────────────────────────────────── */
    .silhouette {
      position: fixed;
      pointer-events: none;
      z-index: 0;
      opacity: 0.07;
    }
    .silhouette-left  { left: -80px; top: 50%; transform: translateY(-50%); width: 340px; }
    .silhouette-right { right: -60px; top: 30%; width: 280px; transform: scaleX(-1); }

    /* ── Body icons row ────────────────────────────────────────────────────── */
    .body-icons {
      display: flex;
      gap: 28px;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
    }

    .body-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      opacity: 0.5;
      transition: opacity 0.3s;
    }

    .body-icon:hover { opacity: 0.9; }

    .body-icon svg {
      width: 28px;
      height: 28px;
      color: var(--rose-light);
    }

    .body-icon-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* ── Layout ────────────────────────────────────────────────────────────── */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 780px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* ── Header ────────────────────────────────────────────────────────────── */
    header { text-align: center; margin-bottom: 8px; position: relative; z-index: 1; }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 68px; height: 68px;
      background: rgba(155,29,110,0.15);
      border: 1px solid rgba(232,53,122,0.3);
      border-radius: 20px;
      margin-bottom: 22px;
      position: relative;
    }

    .logo::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 20px;
      background: var(--gradient);
      z-index: -1;
      opacity: 0.5;
    }

    .logo svg { width: 34px; height: 34px; }

    header h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 2.8rem;
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #f9d0e4 20%, var(--rose-light) 60%, var(--rose) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      line-height: 1.1;
    }

    header p {
      font-size: 0.82rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .header-rule {
      display: flex;
      align-items: center;
      gap: 14px;
      justify-content: center;
      margin-top: 18px;
      margin-bottom: 32px;
    }

    .header-rule::before, .header-rule::after {
      content: '';
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(232,53,122,0.5));
    }

    .header-rule::after { transform: scaleX(-1); }
    .header-rule-diamond { width: 6px; height: 6px; background: var(--rose); transform: rotate(45deg); flex-shrink: 0; }

    /* ── Mode toggle ───────────────────────────────────────────────────────── */
    .mode-toggle {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      width: fit-content;
      padding: 3px; gap: 3px;
    }

    .mode-btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-muted);
      padding: 8px 22px;
      border-radius: 9px;
      transition: background 0.2s, color 0.2s;
    }

    .mode-btn.active { background: var(--gradient); color: #fff; }
    .mode-btn:hover:not(.active) { color: var(--text); background: var(--surface-hover); }

    /* ── Textarea ──────────────────────────────────────────────────────────── */
    textarea {
      width: 100%;
      min-height: 130px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      padding: 16px 18px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.7;
    }

    textarea::placeholder { color: var(--text-dim); }
    textarea:focus {
      border-color: rgba(232,53,122,0.4);
      box-shadow: 0 0 0 3px rgba(232,53,122,0.08);
    }

    /* ── Examples ──────────────────────────────────────────────────────────── */
    .examples-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .examples-label {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      flex: 1;
    }

    .refresh-btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      flex-shrink: 0;
      transition: color 0.2s, border-color 0.2s;
    }

    .refresh-btn:hover { color: var(--rose-light); border-color: rgba(232,53,122,0.4); }

    .example-chip {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.76rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 20px;
      padding: 5px 14px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      text-align: left;
    }

    .example-chip:hover {
      border-color: rgba(232,53,122,0.5);
      color: var(--rose-light);
      background: rgba(232,53,122,0.08);
    }

    /* ── Upload ────────────────────────────────────────────────────────────── */
    .upload-area {
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      background: var(--surface);
    }

    .upload-area:not(.has-preview) { cursor: pointer; }
    .upload-area:not(.has-preview):hover,
    .upload-area.drag-over {
      border-color: rgba(232,53,122,0.35);
      background: rgba(232,53,122,0.04);
    }

    .upload-area input[type="file"] {
      position: absolute; inset: 0; opacity: 0;
      cursor: pointer; width: 100%; height: 100%;
    }

    .upload-area.has-preview input[type="file"] { display: none; }

    .upload-hint {
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .upload-icon {
      width: 40px; height: 40px;
      background: rgba(155,29,110,0.12);
      border: 1px solid rgba(232,53,122,0.2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }

    .upload-icon svg { width: 20px; height: 20px; color: var(--rose-light); }

    .upload-hint-text { font-size: 0.84rem; color: var(--text-muted); }
    .upload-hint-text span { color: var(--rose-light); font-weight: 500; }
    .upload-hint-sub { font-size: 0.72rem; color: var(--text-dim); }

    .upload-preview { display: none; align-items: center; gap: 14px; }
    .upload-preview.visible { display: flex; }

    .upload-preview img {
      width: 72px; height: 72px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .upload-preview-info { flex: 1; text-align: left; }
    .upload-preview-name { font-size: 0.85rem; color: var(--text); word-break: break-all; font-weight: 500; }
    .upload-preview-size { font-size: 0.74rem; color: var(--text-muted); margin-top: 4px; }

    .upload-remove {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.74rem;
      font-weight: 500;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      flex-shrink: 0;
      transition: color 0.2s, border-color 0.2s;
    }

    .upload-remove:hover { color: var(--rose-light); border-color: rgba(232,53,122,0.4); }

    /* ── Actions ───────────────────────────────────────────────────────────── */
    .actions { display: flex; gap: 12px; align-items: center; }

    button {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    }

    #generateBtn {
      background: var(--gradient);
      color: #fff;
      box-shadow: 0 4px 24px rgba(232,53,122,0.35);
      letter-spacing: 0.03em;
    }

    #generateBtn:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 6px 32px rgba(232,53,122,0.55);
    }

    #generateBtn:active:not(:disabled) { transform: translateY(0); }
    #generateBtn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

    #copyAllBtn {
      background: var(--surface);
      color: var(--text-muted);
      border: 1px solid var(--border);
      display: none;
    }

    #copyAllBtn:hover { background: var(--surface-hover); color: var(--text); }
    #copyAllBtn.copied { color: #f9a8d4; border-color: rgba(249,168,212,0.3); }

    /* ── Error ─────────────────────────────────────────────────────────────── */
    #error {
      font-size: 0.82rem;
      color: #fca5a5;
      background: rgba(252,165,165,0.07);
      border: 1px solid rgba(252,165,165,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      display: none;
    }

    /* ── Segments ──────────────────────────────────────────────────────────── */
    .segments { display: flex; flex-direction: column; gap: 10px; }

    .segment {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .segment::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--gradient);
      border-radius: 3px 0 0 3px;
    }

    .segment:hover { border-color: rgba(232,53,122,0.25); }
    .segment.visible { opacity: 1; transform: translateY(0); }

    .segment-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      white-space: nowrap;
      padding-top: 2px;
      min-width: 68px;
    }

    .segment-label span { display: block; font-size: 0.66rem; color: var(--rose-light); margin-bottom: 2px; font-weight: 700; }
    .segment-text { font-size: 0.9rem; line-height: 1.65; color: var(--text); }

    /* ── Spinner ───────────────────────────────────────────────────────────── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(232,53,122,0.15);
      border-top-color: var(--rose-light);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="grid-bg"></div>

  <!-- Silhouette curves -->
  <svg class="silhouette silhouette-left" viewBox="0 0 340 700" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M280 0 C280 0 340 80 320 180 C300 280 200 300 220 420 C240 540 340 580 320 700" stroke="url(#sl1)" stroke-width="2" fill="none"/>
    <path d="M240 0 C240 0 310 100 280 220 C250 340 160 360 180 480 C200 600 300 640 270 700" stroke="url(#sl1)" stroke-width="1" fill="none" opacity="0.5"/>
    <defs>
      <linearGradient id="sl1" x1="0" y1="0" x2="0" y2="700" gradientUnits="userSpaceOnUse">
        <stop stop-color="#e8357a" stop-opacity="0"/>
        <stop offset="0.4" stop-color="#e8357a"/>
        <stop offset="1" stop-color="#9b1d6e" stop-opacity="0"/>

  <svg class="silhouette silhouette-right" viewBox="0 0 280 600" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M60 0 C60 0 0 70 20 160 C40 250 140 270 120 380 C100 490 0 530 30 600" stroke="url(#sr1)" stroke-width="2" fill="none"/>
    <path d="M100 0 C100 0 30 90 60 190 C90 290 180 310 160 420 C140 530 40 560 70 600" stroke="url(#sr1)" stroke-width="1" fill="none" opacity="0.5"/>
    <defs>
      <linearGradient id="sr1" x1="0" y1="0" x2="0" y2="600" gradientUnits="userSpaceOnUse">
        <stop stop-color="#e8357a" stop-opacity="0"/>
        <stop offset="0.4" stop-color="#e8357a"/>
        <stop offset="1" stop-color="#9b1d6e" stop-opacity="0"/>
      </linearGradient>
    </defs>
  </svg>

  <header>
    <div class="logo">
      <svg viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="17" cy="17" r="4" fill="url(#lg)"/>
        <path d="M17 4 C17 4 22 9 22 14 C22 16 20 17 17 17 C14 17 12 16 12 14 C12 9 17 4 17 4Z" fill="url(#lg)" opacity="0.9"/>
        <path d="M30 17 C30 17 25 22 20 22 C18 22 17 20 17 17 C17 14 18 12 20 12 C25 12 30 17 30 17Z" fill="url(#lg)" opacity="0.75"/>
        <path d="M17 30 C17 30 12 25 12 20 C12 18 14 17 17 17 C20 17 22 18 22 20 C22 25 17 30 17 30Z" fill="url(#lg)" opacity="0.9"/>
        <path d="M4 17 C4 17 9 12 14 12 C16 12 17 14 17 17 C17 20 16 22 14 22 C9 22 4 17 4 17Z" fill="url(#lg)" opacity="0.75"/>
        <defs>
          <linearGradient id="lg" x1="4" y1="4" x2="30" y2="30" gradientUnits="userSpaceOnUse">
            <stop stop-color="#f9d0e4"/>

            <stop offset="1" stop-color="#9b1d6e"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <h1>WAN 2.2 Prompt Engine</h1>
    <p>Cinematic &middot; Sensual &middot; Precise</p>
    <div class="header-rule"><div class="header-rule-diamond"></div></div>
  </header>

  <!-- Body form icons -->
  <div class="body-icons">

      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
        <path d="M2 18 C2 18 4 10 9 10 C12 10 13 13 14 13 C15 13 16 10 19 10 C24 10 26 18 26 18"/>

      <span class="body-icon-label">Bust</span>

    <div class="body-icon">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
        <path d="M8 4 C6 8 6 10 8 12 C10 14 10 14 10 14 C10 14 8 16 7 20 C6 24 5 26 5 26"/>
        <path d="M20 4 C22 8 22 10 20 12 C18 14 18 14 18 14 C18 14 20 16 21 20 C22 24 23 26 23 26"/>

      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">

        <path d="M19 3 C19 3 20 10 19 14 C18 18 18 22 19 26"/>

    <div class="body-icon">
      <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 10 C6 10 5 18 7 22 C8 24 10 24 20 23 C22 23 23 21 22 20 C21 19 18 19 18 19"/>
        <path d="M6 10 C6 10 7 5 10 5 C13 5 13 10 13 10"/>

        <line x1="13" y1="20" x2="13" y2="24"/>

      <span class="body-icon-label">Feet</span>

  <div class="container">
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="video">Video Segments</button>
      <button class="mode-btn" data-mode="image">Image Edit</button>
    </div>

    <textarea id="description" placeholder="Describe your scene…" rows="5"></textarea>

    <div class="examples-row">
      <span class="examples-label">Try:</span>
      <div class="examples" id="examples"></div>
      <button class="refresh-btn" id="refreshBtn" type="button">&#8635; Shuffle</button>
      <button class="refresh-btn" id="expandBtn" type="button">Show more</button>
    </div>

    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/gif,image/webp" />
      <div class="upload-hint" id="uploadHint">
        <div class="upload-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
        </div>
        <div class="upload-hint-text">Drop a reference image or <span>click to browse</span></div>
        <div class="upload-hint-sub">Optional &mdash; helps Claude understand the scene &middot; JPEG, PNG, WebP</div>
      </div>
      <div class="upload-preview" id="uploadPreview">
        <img id="previewImg" src="" alt="preview" />
        <div class="upload-preview-info">
          <div class="upload-preview-name" id="previewName"></div>
          <div class="upload-preview-size" id="previewSize"></div>
        </div>
        <button class="upload-remove" id="removeBtn" type="button">Remove</button>
      </div>
    </div>

    <div class="actions">
      <button id="generateBtn">Generate Prompts</button>
      <div class="spinner" id="spinner"></div>
      <button id="copyAllBtn">Copy All</button>
    </div>

    <div id="error"></div>
    <div class="segments" id="segments"></div>
  </div>

  <script>
    const VIDEO_TIMESTAMPS = ['~1–4s', '~5–8s', '~9–12s', '~13–16s', '~17–20s'];
    const IMAGE_LABELS     = ['Concise', 'Detailed', 'Styled'];
    const ALLOWED_TYPES    = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];

    const ALL_EXAMPLES = {
      video: [
        'Topless woman walking slowly toward camera, heavy breast jiggle, soft-body physics, slow motion 60fps',
        'Close-up of ass in thong, slow rhythmic bounce and jiggle, tracking shot from behind, natural physics',
        'Woman arching her back slowly, breasts bouncing, cum dripping down chest, fluid simulation, static camera',
        'POV hips grinding slowly, ass jiggle, thigh wobble, gradual tempo increase, smooth motion loop',
        'Slow pan up bare legs from ankles to thighs, skin detail, soft studio lighting, shallow depth of field',
        'Woman in heels walking away from camera, ass sway, slow motion, tracking shot at waist height',
        'Close-up of breasts bouncing in slow motion, topless, soft light, natural jiggle physics, loop-friendly',
        'Woman arching back on bed, breasts falling to side with natural weight, slow motion, static overhead shot',
        'Cum dripping slowly down inner thighs, fluid simulation, extreme close-up, warm studio light',
        'Woman turning slowly in place, full body, ass jiggle on each step, hair movement, soft backlight',
        'Close-up of feet in heels, slow step toward camera, leg muscles flexing, shallow focus',
        'Woman bending forward slowly, ass presenting, thong, soft-body jiggle, slow zoom from behind',
        'Side profile, woman bouncing on her knees, breasts jiggling heavily, soft-body dynamics, 60fps',
        'Extreme close-up of nipples hardening, slow zoom in, soft studio lighting, static camera',
        'Woman lying on back, legs raised slowly, thighs spreading, static overhead camera, slow motion',
        'Cum landing on ass in slow motion, fluid splatter simulation, extreme close-up, warm backlight',
        'Tracking shot of legs walking in stockings and heels, slow motion, floor level camera, shallow focus',
        'Woman sitting and crossing her legs slowly, thigh jiggle, skirt riding up, soft light, static camera',
        'Close-up of ass clapping in slow motion, heavy soft-body jiggle, rhythmic motion, warm studio light',
        'Woman pulling her top down slowly, breasts spilling out, natural jiggle, slow motion, static front shot',
        'POV standing over woman lying down looking up, she arches back slowly, breasts rising, slow motion',
        'Fluid dripping from fingers slowly onto chest, cum simulation, close-up, soft directional light',
        'Woman in doggy position, ass jiggle, thigh wobble, camera slowly dollying in from behind',
        'Close-up of inner thighs, slow squeeze and release, skin detail, soft warm light, static camera',
      ],
      image: [
        'Pose her bent over presenting, ass toward camera, legs spread, keep existing lighting',
        'Add cum on face and breasts, glistening wet skin, dripping, photorealistic, 8k, sharp detail',
        'Make lingerie sheer and see-through, detailed skin underneath, soft studio lighting, high detail',
        'Change pose to on all fours looking over shoulder, seductive eye contact, keep background and lighting',
        'Add thigh-high stockings and heels, keep pose and body, warm rim lighting, photorealistic',
        'Enhance breast size and shape, natural skin texture, keep all other details, 8k sharp focus',
        'Add a creampie, dripping, photorealistic fluid, keep pose and lighting, high detail',
        'Change background to luxury hotel bedroom, soft candlelight, keep subject pose and body',
        'Make her expression more seductive, parted lips, bedroom eyes, keep body and lighting',
        'Add wet glistening skin, water droplets, post-shower look, soft warm lighting, sharp detail',
        'Remove clothing completely, natural skin, keep pose, lighting, and background identical',
        'Add neon pink lighting from the left, deep shadows right side, keep pose and subject unchanged',
        'Change pose to legs spread lying back, keep face, body, and lighting, 8k photorealistic',
        'Add cum dripping from mouth, chin, and neck, glistening, photorealistic fluid, keep everything else',
        'Make nipples more prominent and detailed, keep body and lighting identical, sharp 8k detail',
        'Add a collar and leash, keep pose and body, soft studio lighting, photorealistic accessories',
        'Change outfit to crotchless fishnet bodysuit, keep pose and lighting, detailed skin visible through mesh',
        'Add a second woman behind her, hands on hips, keep original subject unchanged, soft studio light',
        'Make skin more oiled and shiny, glistening highlights, keep pose and background, 8k detail',
        'Zoom into ass close-up, crop to waist down, keep lighting and skin detail, sharp focus',
        'Add anal plug, keep pose and body unchanged, photorealistic, 8k, detailed',
        'Change hair to long flowing blonde, keep face body and lighting identical',
        'Add red lipstick and heavy eye makeup, keep body and lighting, photorealistic face detail',
        'Make the setting an outdoor pool at night, keep subject pose and body, moonlight and pool glow',
      ],
    };

    const CHIPS_DEFAULT = 4;
    let examplesExpanded = false;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    const generateBtn   = document.getElementById('generateBtn');
    const copyAllBtn    = document.getElementById('copyAllBtn');
    const spinner       = document.getElementById('spinner');
    const errorEl       = document.getElementById('error');
    const segmentsEl    = document.getElementById('segments');
    const descriptionEl = document.getElementById('description');
    const modeBtns      = document.querySelectorAll('.mode-btn');
    const uploadArea    = document.getElementById('uploadArea');
    const fileInput     = document.getElementById('fileInput');
    const uploadHint    = document.getElementById('uploadHint');
    const uploadPreview = document.getElementById('uploadPreview');
    const previewImg    = document.getElementById('previewImg');
    const previewName   = document.getElementById('previewName');
    const previewSize   = document.getElementById('previewSize');
    const removeBtn     = document.getElementById('removeBtn');
    const examplesEl    = document.getElementById('examples');
    const refreshBtn    = document.getElementById('refreshBtn');
    const expandBtn     = document.getElementById('expandBtn');

    let mode = 'video';
    let lastPrompts = [];
    let uploadedImage = null;
    let shuffledExamples = [];

    // ── Mode toggle ───────────────────────────────────────────────────────────
    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        mode = btn.dataset.mode;
        modeBtns.forEach(b => b.classList.toggle('active', b === btn));
        descriptionEl.placeholder = mode === 'video'
          ? 'Describe your video scene…'
          : 'Describe the image edit you want to make…';
        segmentsEl.innerHTML = '';
        copyAllBtn.style.display = 'none';
        showError(null);
        lastPrompts = [];
        examplesExpanded = false;
        renderExamples();
      });
    });

    // ── Examples ──────────────────────────────────────────────────────────────
    function renderExamples(keepOrder = false) {
      if (!keepOrder) {
        shuffledExamples = shuffle(ALL_EXAMPLES[mode]);
        examplesExpanded = false;
      }
      const picks = examplesExpanded ? shuffledExamples : shuffledExamples.slice(0, CHIPS_DEFAULT);
      examplesEl.innerHTML = '';
      picks.forEach(text => {
        const chip = document.createElement('button');
        chip.className = 'example-chip';
        chip.type = 'button';
        chip.textContent = text;
        chip.addEventListener('click', () => { descriptionEl.value = text; descriptionEl.focus(); });
        examplesEl.appendChild(chip);
      });
      expandBtn.textContent = examplesExpanded ? 'Show less' : 'Show more';
    }

    refreshBtn.addEventListener('click', () => renderExamples(false));
    expandBtn.addEventListener('click', () => { examplesExpanded = !examplesExpanded; renderExamples(true); });
    renderExamples();

    // ── Upload ────────────────────────────────────────────────────────────────
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag-over'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag-over'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });
    removeBtn.addEventListener('click', () => clearUpload());

    function handleFile(file) {
      if (!ALLOWED_TYPES.includes(file.type)) {
        showError('Unsupported file type. Use JPEG, PNG, GIF, or WebP.');
        return;
      }
      showError(null);
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          const MAX = 1024;
          let { width, height } = img;
          if (width > MAX || height > MAX) {
            if (width >= height) { height = Math.round(height * MAX / width); width = MAX; }
            else { width = Math.round(width * MAX / height); height = MAX; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
          uploadedImage = { data: dataUrl.split(',')[1], mediaType: 'image/jpeg' };
          previewImg.src = dataUrl;
          previewName.textContent = file.name;
          previewSize.textContent = `${width}×${height} · compressed`;
          uploadHint.style.display = 'none';
          uploadPreview.classList.add('visible');
          uploadArea.classList.add('has-preview');
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }

    function clearUpload() {
      uploadedImage = null;
      try { fileInput.value = ''; } catch (_) {}
      previewImg.src = '';
      uploadPreview.classList.remove('visible');
      uploadArea.classList.remove('has-preview');
      uploadHint.style.display = '';
    }

    // ── Generate ──────────────────────────────────────────────────────────────
    generateBtn.addEventListener('click', async () => {
      const description = descriptionEl.value.trim();
      if (!description) return;

      setLoading(true);
      showError(null);
      segmentsEl.innerHTML = '';
      copyAllBtn.style.display = 'none';
      lastPrompts = [];
      renderExamples(); // rotate chips on each generate

      const endpoint = mode === 'video' ? '/api/generate' : '/api/image-prompt';
      const body = { description };
      if (uploadedImage) body.image = uploadedImage;

      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        let data;
        try { data = await res.json(); } catch (_) { throw new Error(`Server error (${res.status})`); }
        if (!res.ok) throw new Error(typeof data.error === 'string' ? data.error : JSON.stringify(data.error));

        lastPrompts = data.prompts;
        renderSegments(data.prompts);
        copyAllBtn.style.display = 'inline-block';
      } catch (err) {
        showError(err.message);
      } finally {
        setLoading(false);
      }
    });

    // ── Copy all ──────────────────────────────────────────────────────────────
    copyAllBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(lastPrompts.join('\n')).then(() => {
        copyAllBtn.textContent = 'Copied!';
        copyAllBtn.classList.add('copied');
        setTimeout(() => { copyAllBtn.textContent = 'Copy All'; copyAllBtn.classList.remove('copied'); }, 1800);
      });
    });

    // ── Render ────────────────────────────────────────────────────────────────
    function renderSegments(prompts) {
      prompts.forEach((text, i) => {
        const seg = document.createElement('div');
        seg.className = 'segment';
        const label = mode === 'video'
          ? `<span>SEG ${i + 1}</span>${VIDEO_TIMESTAMPS[i]}`
          : `<span>${IMAGE_LABELS[i]}</span>`;
        seg.innerHTML = `<div class="segment-label">${label}</div><div class="segment-text">${escapeHtml(text)}</div>`;
        segmentsEl.appendChild(seg);
        setTimeout(() => seg.classList.add('visible'), 40 + i * 70);
      });
    }

    function setLoading(on) {
      generateBtn.disabled = on;
      spinner.style.display = on ? 'block' : 'none';
    }

    function showError(msg) {
      errorEl.textContent = msg || '';
      errorEl.style.display = msg ? 'block' : 'none';
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  </script>
</body>
